services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: calendar
      MYSQL_USER: calendar
      MYSQL_PASSWORD: calendar
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data_v2:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql://calendar:calendar@db:3306/calendar}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-to-a-long-random-string}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
    ports:
      - "3000:3000"
    command: sh -c "npx prisma db push --schema=/app/prisma/schema.prisma --accept-data-loss && npm start"

volumes:
  mysql_data_v2:
